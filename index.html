<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Listening Practice</title>

<style>
body{
  margin:0;
  font-family:Arial,"Noto Sans TC",sans-serif;
  background:#0b1220;
  color:#eaf0ff;
}

header{
  padding:25px;
  text-align:center;
  background:#111a2e;
}

.container{
  max-width:800px;
  margin:auto;
  padding:15px;
}

.card{
  background:#111a2e;
  padding:15px;
  border-radius:12px;
  margin:15px 0;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4f8cff;
  color:white;
  margin-top:8px;
}

.option{
  display:block;
  padding:10px;
  margin:6px 0;
  background:#1b2740;
  border-radius:8px;
  cursor:pointer;
}

.option:hover{
  background:#24365c;
}

.answer{
  margin-top:10px;
  padding:10px;
  background:#1f3b2c;
  border-left:4px solid #22c55e;
  display:none;
}
</style>
</head>

<body>

<header>
<h1>🎧 TOEIC Listening Practice</h1>
<p>Part 2 練習 + 解答解析</p>
</header>

<div class="container">

<!-- 🎧 AUDIO -->
<div class="card">
<h2>🎧 聽力播放</h2>

<iframe width="100%" height="200"
src="https://www.youtube.com/embed/vXkXJ57Ip4w"
title="TOEIC Listening"
frameborder="0"
allowfullscreen></iframe>

</div>

<!-- 🧠 QUESTION -->
<div class="card">
<h2>Q1</h2>
<p><b>What will the man most likely do?</b></p>

<div class="option" onclick="check(this,'A')">A. Go to the meeting</div>
<div class="option" onclick="check(this,'B')">B. Call his manager</div>
<div class="option" onclick="check(this,'C')">C. Leave the office</div>
<div class="option" onclick="check(this,'D')">D. Cancel the plan</div>

<div class="answer" id="ans">
<b>✔ Answer: B</b><br><br>
<b>Explanation:</b><br>
The speaker mentions he will "call his manager first", which indicates option B is correct.
</div>

<button onclick="showAnswer()">顯示解答</button>
</div>

</div>

<script>
function showAnswer(){
  document.getElementById("ans").style.display="block";
}

function check(el,ans){
  const correct="B";
  if(ans===correct){
    el.style.background="#1f3b2c";
    el.innerHTML+=" ✔ 正確";
  }else{
    el.style.background="#3b1f1f";
    el.innerHTML+=" ✘ 錯誤";
  }
}
</script>

</body>
</html>
